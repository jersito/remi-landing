  body {

  /* Loading state */

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top: 3px solid #9B8EC4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  /* Error state */

    text-align: center;
    max-width: 400px;
    margin: 0 auto;
    padding-top: 15vh;
  }
  .error-brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, #7A9DB0, #9B8EC4);
    padding: 6px 14px;
    border-radius: 10px;
    margin-bottom: 28px;
  }
  .error-brand img { width: 22px; height: 22px; border-radius: 5px; }
  .error-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .error-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.7; }
  .error-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #E85D75; }
  .error-card p { color: rgba(255,255,255,0.5); font-size: 15px; line-height: 1.6; }
  .error-footer { margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.15); font-weight: 600; letter-spacing: 0.5px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 8px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function calculateAge(dob) {
  const birth = new Date(dob);
  const now = new Date();
  let months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
  if (now.getDate() < birth.getDate()) months--;
  if (months >= 1) return months + ' month' + (months !== 1 ? 's' : '') + ' old';
  const weeks = Math.floor((now.getTime() - birth.getTime()) / (7 * 86400000));
  return weeks + ' week' + (weeks !== 1 ? 's' : '') + ' old';
}

function getAgeMonths(dob) {
  const birth = new Date(dob);
  const now = new Date();
  let months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
  if (now.getDate() < birth.getDate()) months--;
  return Math.max(0, months);
}

function daysBetween(start, d) {
  const s = new Date(start); s.setHours(0,0,0,0);
  const t = new Date(d); t.setHours(0,0,0,0);
  return Math.floor((t.getTime() - s.getTime()) / 86400000);
}

function computeDailyFeeds(entries, totalDays, startDate) {
  const b = new Array(totalDays).fill(0);
  entries.forEach(e => { if (e.entry_type !== 'feeding') return; const i = daysBetween(startDate, e.occurred_at); if (i >= 0 && i < totalDays) b[i]++; });
  return b;
}

function computeDailySleep(entries, totalDays, startDate) {
  const b = new Array(totalDays).fill(0);
  const sl = entries.filter(e => e.entry_type === 'sleep').sort((a,c) => new Date(a.occurred_at) - new Date(c.occurred_at));
  for (let i = 0; i < sl.length; i++) {
    if (sl[i].sleep_event !== 'fell_asleep') continue;
    const w = sl.find((e,j) => j > i && e.sleep_event === 'woke_up');
    if (!w) continue;
    const hrs = (new Date(w.occurred_at) - new Date(sl[i].occurred_at)) / 3600000;
    if (hrs <= 0 || hrs > 24) continue;
    const idx = daysBetween(startDate, w.occurred_at);
    if (idx >= 0 && idx < totalDays) b[idx] += Math.round(hrs * 10) / 10;
  }
  return b;
}

function computeDailyDiapers(entries, totalDays, startDate) {
  const wet = new Array(totalDays).fill(0), dirty = new Array(totalDays).fill(0);
  entries.forEach(e => {
    if (e.entry_type !== 'diaper') return;
    const i = daysBetween(startDate, e.occurred_at);
    if (i < 0 || i >= totalDays) return;
    if (e.diaper_type === 'wet' || e.diaper_type === 'both') wet[i]++;
    if (e.diaper_type === 'dirty' || e.diaper_type === 'both') dirty[i]++;
  });
  return { wet, dirty };
}

function computeBreastBottleSplit(entries) {
  const feeds = entries.filter(e => e.entry_type === 'feeding');
  const breast = feeds.filter(f => f.feed_type === 'breast_left' || f.feed_type === 'breast_right' || f.feed_type === 'breast_both').length;
  const bottle = feeds.filter(f => f.feed_type === 'bottle').length;
  const total = breast + bottle;
  if (total === 0) return { breastPct: 0, bottlePct: 0 };
  const bp = Math.round((breast / total) * 100);
  return { breastPct: bp, bottlePct: 100 - bp };
}

function computeAvgNaps(entries, totalDays) {
  const napCount = entries.filter(e => e.entry_type === 'sleep' && e.sleep_event === 'fell_asleep').length;
  return Math.round((napCount / Math.max(1, totalDays)) * 10) / 10;
}

function getHealthEvents(entries) {
  return entries.filter(e => e.entry_type === 'health' || e.entry_type === 'note').map(e => {
    const d = new Date(e.occurred_at);
    return {
      date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: 'numeric', minute: '2-digit' }),
      type: e.entry_type,
      notes: e.notes || null
    };
  });
}

function computeWarnings(ageMonths, feeding, sleep, diaper) {
  const w = [];
  if (ageMonths < 6 && diaper.avgWetPerDay > 0 && diaper.avgWetPerDay < 6) w.push('Average wet diapers is ' + diaper.avgWetPerDay + '/day. The AAP recommends at least 6 per day for babies under 6 months.');
  if (ageMonths < 6 && feeding.avgFeedingsPerDay > 0 && feeding.avgFeedingsPerDay < 6) w.push('Average feeds is ' + feeding.avgFeedingsPerDay + '/day. Babies under 6 months typically need 6-8 feeds per day.');
  if (ageMonths >= 4 && sleep.avgHoursPerDay > 0) {
    if (ageMonths < 12 && sleep.avgHoursPerDay < 12) w.push('Average sleep is ' + sleep.avgHoursPerDay + 'h/day. The AASM recommends 12-16 hours for babies 4-12 months.');
    else if (ageMonths >= 12 && ageMonths < 24 && sleep.avgHoursPerDay < 11) w.push('Average sleep is ' + sleep.avgHoursPerDay + 'h/day. The AASM recommends 11-14 hours for toddlers 1-2 years.');
  }
  return w;
}

function buildBarSVG(data, color, secondaryData, secondaryColor, legendLabels) {
  const W = 480, H = 110;
  const pad = { top: 16, right: 8, bottom: 24, left: 32 };
  const maxVal = Math.max(1, ...data, ...(secondaryData || []));
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const hasPaired = !!secondaryData;
  const slotW = plotW / data.length;
  const gap = hasPaired ? 2 : 0;
  const barW = hasPaired ? Math.max(3, (slotW - gap * 3) / 2) : Math.max(3, slotW - 3);

  let svg = '';
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    const y = pad.top + plotH - plotH * frac;
    const val = Math.round(maxVal * frac * 10) / 10;
    svg += '<line x1="' + pad.left + '" y1="' + y + '" x2="' + (W - pad.right) + '" y2="' + y + '" stroke="rgba(255,255,255,0.10)" stroke-width="0.5" stroke-dasharray="3,3"/>';
    svg += '<text x="' + (pad.left - 6) + '" y="' + (y + 3) + '" fill="rgba(255,255,255,0.55)" font-size="8" font-family="sans-serif" text-anchor="end">' + (val % 1 === 0 ? val : val.toFixed(1)) + '</text>';
  });

  svg += '<line x1="' + pad.left + '" y1="' + (pad.top + plotH) + '" x2="' + (W - pad.right) + '" y2="' + (pad.top + plotH) + '" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';

  data.forEach((val, i) => {
    const x = pad.left + i * slotW + (hasPaired ? gap : (slotW - barW) / 2);
    const h = (val / maxVal) * plotH;
    const y = pad.top + plotH - h;
    const rx = Math.min(4, barW / 2);
    if (h > 0) svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + Math.max(0, h) + '" fill="' + color + '" rx="' + rx + '" ry="' + rx + '" opacity="1"/>';
    if (secondaryData && secondaryData[i] > 0) {
      const x2 = x + barW + gap;
      const h2 = (secondaryData[i] / maxVal) * plotH;
      const y2 = pad.top + plotH - h2;
      svg += '<rect x="' + x2 + '" y="' + y2 + '" width="' + barW + '" height="' + Math.max(0, h2) + '" fill="' + secondaryColor + '" rx="' + rx + '" ry="' + rx + '" opacity="1"/>';
    }
  });

  const labelCount = Math.min(data.length, 7);
  const step = Math.max(1, Math.floor(data.length / labelCount));
  data.forEach((_, i) => {
    if (i % step !== 0 && i !== data.length - 1) return;
    const x = pad.left + i * slotW + slotW / 2;
    svg += '<text x="' + x + '" y="' + (H - 2) + '" fill="rgba(255,255,255,0.25)" font-size="8" font-family="sans-serif" text-anchor="middle">D' + (i + 1) + '</text>';
  });

  let legend = '';
  if (hasPaired && legendLabels) {
    legend = '<rect x="' + pad.left + '" y="' + (H + 6) + '" width="10" height="10" fill="' + color + '" rx="3"/>' +
      '<text x="' + (pad.left + 14) + '" y="' + (H + 14) + '" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">' + legendLabels[0] + '</text>' +
      '<rect x="' + (pad.left + 60) + '" y="' + (H + 6) + '" width="10" height="10" fill="' + secondaryColor + '" rx="3"/>' +
      '<text x="' + (pad.left + 74) + '" y="' + (H + 14) + '" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">' + legendLabels[1] + '</text>';
  }

  const svgH = hasPaired ? H + 24 : H;
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg" style="max-width:' + W + 'px;">' + svg + legend + '</svg>';
}

function renderSummary(data) {
  const { babyName, dateOfBirth, startDate, endDate, totalDays, feeding, sleep, diaper, entries } = data;
  const start = formatDate(startDate);
  const end = formatDate(endDate);
  const ageLabel = calculateAge(dateOfBirth);
  const ageMonths = getAgeMonths(dateOfBirth);

  const dailyFeeds = computeDailyFeeds(entries, totalDays, startDate);
  const dailySleep = computeDailySleep(entries, totalDays, startDate);
  const { wet: dailyWet, dirty: dailyDirty } = computeDailyDiapers(entries, totalDays, startDate);
  const { breastPct, bottlePct } = computeBreastBottleSplit(entries);
  const healthEvents = getHealthEvents(entries);
  const avgNaps = computeAvgNaps(entries, totalDays);
  const warnings = computeWarnings(ageMonths, feeding, sleep, diaper);

  const feedChart = feeding.totalFeedings > 0 ? buildBarSVG(dailyFeeds, '#7A9DB0') : '';
  const sleepChart = sleep.avgHoursPerDay > 0 ? buildBarSVG(dailySleep, '#9B8EC4') : '';
  const diaperChart = diaper.avgTotalPerDay > 0 ? buildBarSVG(dailyWet, '#5DA6E6', dailyDirty, '#D4956B', ['Wet', 'Dirty']) : '';

  const breakdownBar = (breastPct > 0 || bottlePct > 0) ? '<div class="breakdown-container"><div class="breakdown-label-row"><span class="breakdown-label" style="color:#7A9DB0;">Breast ' + breastPct + '%</span><span class="breakdown-label" style="color:#F2C4A4;">Bottle ' + bottlePct + '%</span></div><div class="breakdown-track"><div class="breakdown-fill-breast" style="width:' + breastPct + '%;"></div><div class="breakdown-fill-bottle" style="width:' + bottlePct + '%;"></div></div></div>' : '';

  const warningsSection = warnings.length === 0 ? '' : '<div class="card warning-card"><div class="card-header"><span class="warning-header-icon">&#x26A0;</span><span class="card-title" style="color:#FBBF24;">Concerns</span></div>' + warnings.map(w => '<div class="warning-row"><span class="warning-bullet">&#x25CF;</span><span class="warning-text">' + esc(w) + '</span></div>').join('') + '<p class="warning-disclaimer">Based on AAP/AASM guidelines. Not medical advice.</p></div>';

  const healthSection = healthEvents.length > 0 ? '<div class="card"><div class="card-header"><span class="card-icon">&#x1FA7A;</span><span class="card-title">Health Events</span><span class="count">' + healthEvents.length + '</span></div><div class="health-timeline">' + healthEvents.map(ev => '<div class="health-row"><div class="health-date">' + esc(ev.date) + '</div><div class="health-type">' + (ev.type === 'health' ? 'Health' : 'Note') + '</div>' + (ev.notes ? '<div class="health-notes">' + esc(ev.notes) + '</div>' : '') + '</div>').join('') + '</div></div>' : '';

  document.title = esc(babyName) + ' - Visit Summary';

  return '<div class="header"><div class="brand"><img src="data:image/png;base64,' + LOGO_BASE64 + '" class="brand-logo" alt="Remi"/>Remi</div><h1>' + esc(babyName) + '</h1><p class="age">' + esc(ageLabel) + '</p><p class="period">' + start + ' to ' + end + '</p></div>' +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F37C;</span><span class="card-title">Feeding</span></div>' + (feeding.totalFeedings > 0 ? '<div class="stats-row"><div class="stat-pill accent-blue"><div class="stat-value">' + feeding.avgFeedingsPerDay + '</div><div class="stat-label">Avg Feeds / Day</div></div>' + (feeding.avgAmountMl !== null ? '<div class="stat-pill accent-peach"><div class="stat-value">' + feeding.avgAmountMl + ' mL</div><div class="stat-label">Avg per Feed</div></div>' : '') + '</div>' + breakdownBar + '<p class="chart-label">Daily feed counts</p>' + feedChart : '<p class="empty">No feeding data recorded</p>') + '</div>' +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F4A7;</span><span class="card-title">Diapers</span></div>' + (diaper.avgTotalPerDay > 0 ? '<div class="stats-row"><div class="stat-pill accent-sky"><div class="stat-value">' + diaper.avgWetPerDay + '</div><div class="stat-label">Avg Wet / Day</div></div><div class="stat-pill accent-peach"><div class="stat-value">' + diaper.avgDirtyPerDay + '</div><div class="stat-label">Avg Dirty / Day</div></div></div><p class="chart-label">Daily diaper counts</p>' + diaperChart : '<p class="empty">No diaper data recorded</p>') + '</div>' +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F634;</span><span class="card-title">Sleep</span></div>' + (sleep.avgHoursPerDay > 0 ? '<div class="stats-row"><div class="stat-pill accent-purple"><div class="stat-value">' + sleep.avgHoursPerDay + 'h</div><div class="stat-label">Avg Total / Day</div></div><div class="stat-pill accent-blue"><div class="stat-value">' + avgNaps + '</div><div class="stat-label">Avg Naps / Day</div></div></div><p class="chart-label">Daily sleep hours</p>' + sleepChart : '<p class="empty">No sleep data recorded</p>') + '</div>' +
    warningsSection +
    healthSection +
    '<div class="footer"><div class="footer-brand">Shared via <a href="' + LANDING_URL + '" target="_blank" rel="noopener" class="footer-link">Remi</a> &middot; ' + formatDate(new Date()) + '</div></div>';
}

function showError(message) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerHTML = '<div class="error-wrap"><div class="error-brand"><img src="data:image/png;base64,' + LOGO_BASE64 + '" alt="Remi"/>Remi</div><div class="error-card"><div class="error-icon">&#x26A0;</div><h2>Something went wrong</h2><p>' + esc(message) + '</p></div><div class="error-footer">Remi Baby Tracker</div></div>';
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const shareId = params.get('id');

  if (!shareId) {
    showError('No share ID provided. Please check your link.');
    return;
  }

  try {
    const res = await fetch(API_BASE + '?id=' + encodeURIComponent(shareId));
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Failed to load visit summary.');
      return;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = renderSummary(data);
  } catch (err) {
    showError('Unable to load visit summary. Please try again later.');
  }
}

init();
</script>
</body>
</html>
