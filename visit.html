<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Visit Summary - Remi</title>
<meta name="description" content="View your baby's visit summary - feeding, sleep, diaper stats and health events tracked with Remi." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Baby Visit Summary - Remi" />
<meta property="og:description" content="View feeding, sleep, and diaper stats tracked with the Remi baby tracker app." />
<meta property="og:image" content="https://remibabyapp.com/og-image.png" />
<meta property="og:site_name" content="Remi" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Baby Visit Summary - Remi" />
<meta name="twitter:description" content="View feeding, sleep, and diaper stats tracked with the Remi baby tracker app." />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(165deg, #0f0f1e 0%, #1a1a2e 50%, #16162b 100%);
    color: #E8E8F0;
    min-height: 100vh;
    padding: 0;
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, #7A9DB0 0%, #9B8EC4 35%, #F2C4A4 70%, #5DA6E6 100%);
  }

  .page-wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 20px 32px;
  }

  /* Loading state */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top: 3px solid #9B8EC4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  /* Error state */
  .error-wrap {
    text-align: center;
    max-width: 400px;
    margin: 0 auto;
    padding-top: 15vh;
  }
  .error-brand {
    display: block;
    text-align: center;
    margin-bottom: 28px;
  }
  .error-brand img { height: 36px; }
  .error-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .error-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.7; }
  .error-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #E85D75; }
  .error-card p { color: rgba(255,255,255,0.5); font-size: 15px; line-height: 1.6; }
  .error-footer { margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.15); font-weight: 600; letter-spacing: 0.5px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 8px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .brand {
    display: block;
    text-align: center;
    margin-bottom: 16px;
  }
  .brand-logo { height: 36px; }
  .header h1 {
    font-size: 32px;
    font-weight: 800;
    color: #FFFFFF;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .header .age { font-size: 17px; color: rgba(255,255,255,0.55); font-weight: 500; margin-bottom: 4px; }
  .header .dob { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 400; margin-bottom: 4px; }
  .header .period { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 400; }

  /* Cards (glassmorphism) */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .card-icon {
    font-size: 20px; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 11px; background: rgba(255,255,255,0.10);
  }
  .card-title { font-size: 18px; font-weight: 700; color: #FFFFFF; }
  .count {
    margin-left: auto; font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.10);
    padding: 3px 10px; border-radius: 10px;
  }

  /* Stats */
  .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-pill {
    flex: 1; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px;
  }
  .stat-pill.accent-blue { background: rgba(122,157,176,0.12); border-color: rgba(122,157,176,0.2); }
  .stat-pill.accent-purple { background: rgba(155,142,196,0.12); border-color: rgba(155,142,196,0.2); }
  .stat-pill.accent-peach { background: rgba(242,196,164,0.12); border-color: rgba(242,196,164,0.2); }
  .stat-pill.accent-sky { background: rgba(93,166,230,0.12); border-color: rgba(93,166,230,0.2); }
  .stat-value { font-size: 28px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Breakdown bar */
  .breakdown-container { margin-bottom: 14px; }
  .breakdown-label-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .breakdown-label { font-size: 11px; font-weight: 600; }
  .breakdown-track { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: rgba(255,255,255,0.10); }
  .breakdown-fill-breast { height: 100%; background: linear-gradient(90deg, #7A9DB0, #8BAFC0); border-radius: 5px 0 0 5px; }
  .breakdown-fill-bottle { height: 100%; background: linear-gradient(90deg, #F2C4A4, #E8B08E); border-radius: 0 5px 5px 0; }

  /* Charts */
  .chart-label { font-size: 10px; color: rgba(255,255,255,0.55); margin-bottom: 8px; margin-top: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  svg { display: block; margin-bottom: 4px; }
  .bar-group { transition: filter 0.15s; }
  .bar-group rect:first-child { transition: fill 0.15s; }
  .bar-group:hover rect:first-child { fill: rgba(255,255,255,0.08) !important; }
  .bar-group:hover { filter: brightness(1.4); }
  .bar-group.selected rect:first-child { fill: rgba(255,255,255,0.12) !important; }
  .bar-group.selected { filter: brightness(1.5); }

  /* Notable entries */
  .notable-entries {
    margin-top: 8px; padding: 10px 14px; border-radius: 12px;
    background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.12);
    font-size: 12px;
  }
  .notable-entries-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(251,191,36,0.7); margin-bottom: 6px; }
  .notable-entry { display: flex; gap: 8px; padding: 4px 0; color: rgba(255,255,255,0.6); }
  .notable-entry-date { color: rgba(255,255,255,0.4); font-size: 11px; flex-shrink: 0; min-width: 50px; }
  .notable-entry-text { font-size: 12px; }

  /* Warnings */
  .warning-card { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.18); }
  .warning-header-icon { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 11px; background: rgba(251,191,36,0.15); font-size: 18px; }
  .warning-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; padding: 10px 12px; background: rgba(251,191,36,0.06); border-radius: 10px; border: 1px solid rgba(251,191,36,0.08); }
  .warning-bullet { color: #FBBF24; font-size: 10px; line-height: 22px; flex-shrink: 0; }
  .warning-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 20px; }
  .warning-disclaimer { font-size: 10px; color: rgba(251,191,36,0.5); font-style: italic; margin-top: 6px; }

  .empty { color: rgba(255,255,255,0.25); font-style: italic; font-size: 13px; padding: 8px 0; }

  /* Health events (timeline) */
  .health-timeline { position: relative; padding-left: 20px; }
  .health-timeline::before { content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px; background: linear-gradient(180deg, #7A9DB0, #9B8EC4); border-radius: 1px; opacity: 0.5; }
  .health-row { position: relative; padding: 8px 0 14px 8px; }
  .health-row::before { content: ''; position: absolute; left: -17px; top: 13px; width: 8px; height: 8px; background: #7A9DB0; border-radius: 50%; border: 2px solid #1a1a2e; box-shadow: 0 0 6px rgba(122,157,176,0.4); }
  .health-row:last-child { padding-bottom: 0; }
  .health-date { font-size: 10px; color: rgba(255,255,255,0.55); font-weight: 500; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.3px; }
  .health-type { font-size: 14px; font-weight: 700; color: #FFFFFF; text-transform: capitalize; margin-bottom: 2px; }
  .health-notes { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 18px; }

  /* Footer */
  .footer { margin-top: 32px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.10); }
  .footer-brand { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: rgba(255,255,255,0.2); }
  .footer-link { text-decoration: none; background: linear-gradient(135deg, #7A9DB0, #9B8EC4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 800; }
  .footer-link:hover { opacity: 0.8; }

  /* Range selector */
  .range-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .range-btn {
    padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
    background: transparent; color: rgba(255,255,255,0.5); font-weight: 600; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .range-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  .range-btn.active { background: linear-gradient(135deg, #7A9DB0, #9B8EC4); color: #fff; border-color: transparent; }

  /* Day detail panel */
  .day-detail {
    margin-top: 8px; padding: 12px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    font-size: 13px; color: rgba(255,255,255,0.7); display: none;
  }
  .day-detail.visible { display: block; }
  .day-detail-title { font-weight: 700; color: #fff; margin-bottom: 6px; font-size: 14px; }
  .day-detail-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .day-detail-row span:first-child { color: rgba(255,255,255,0.5); }

  @media print {
    body { background: #FFFFFF; color: #1E293B; }
    .accent-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .header h1 { color: #0F172A; }
    .header .age { color: #64748B; }
    .header .dob { color: #94A3B8; }
    .header .period { color: #94A3B8; }
    .header { border-bottom-color: #E2E8F0; }
    .card { background: #FFFFFF; border: 1px solid #E2E8F0; backdrop-filter: none; -webkit-backdrop-filter: none; box-shadow: none; }
    .card-title { color: #0F172A; }
    .count { color: #64748B; background: #F1F5F9; }
    .card-icon { background: #F8FAFC; }
    .stat-pill { background: #F8FAFC; border-color: #E2E8F0; }
    .stat-value { color: #0F172A; }
    .stat-label { color: #64748B; }
    .chart-label { color: #64748B; }
    .health-date { color: #64748B; }
    .health-type { color: #0F172A; }
    .health-notes { color: #475569; }
    .health-row::before { border-color: #FFFFFF; }
    .empty { color: #94A3B8; }
    .footer { border-top-color: #E2E8F0; }
    .footer-brand { color: #94A3B8; -webkit-text-fill-color: #94A3B8; }
    .breakdown-track { background: #F1F5F9; }
    .warning-card { background: #FFFBEB; border-color: #FDE68A; }
    .warning-header-icon { background: rgba(245,158,11,0.12); }
    .warning-row { background: rgba(255,255,255,0.5); border-color: #FDE68A; }
    .warning-bullet { color: #D97706; }
    .warning-text { color: #92400E; }
    .warning-disclaimer { color: #B45309; }
    .card-title { color: #0F172A; }
    .range-selector { display: none; }
  }
</style>
</head>

  var now = new Date();
  var months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
  if (now.getDate() < birth.getDate()) months--;
  if (months >= 1) return months + ' month' + (months !== 1 ? 's' : '') + ' old';
  var weeks = Math.floor((now.getTime() - birth.getTime()) / (7 * 86400000));
  return weeks + ' week' + (weeks !== 1 ? 's' : '') + ' old';
}

function getAgeMonths(dob) {
  var birth = new Date(dob);
  var now = new Date();
  var months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
  if (now.getDate() < birth.getDate()) months--;
  return Math.max(0, months);
}

function daysBetween(start, d) {
  var s = new Date(start); s.setHours(12,0,0,0);
  var t = new Date(d); t.setHours(12,0,0,0);
  return Math.round((t.getTime() - s.getTime()) / 86400000);
}

function seededRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function computeDailyFeeds(entries, totalDays, startDate) {
  var b = new Array(totalDays).fill(0);
  entries.forEach(function(e) { if (e.entry_type !== 'feeding') return; var i = daysBetween(startDate, e.occurred_at); if (i >= 0 && i < totalDays) b[i]++; });
  return b;
}

function computeDailyFeedsByType(entries, totalDays, startDate) {
  var breast = new Array(totalDays).fill(0);
  var bottle = new Array(totalDays).fill(0);
  entries.forEach(function(e) {
    if (e.entry_type !== 'feeding') return;
    var i = daysBetween(startDate, e.occurred_at);
    if (i < 0 || i >= totalDays) return;
    if (e.feed_type === 'bottle') bottle[i]++;
    else breast[i]++;
  });
  return { breast: breast, bottle: bottle };
}

function computeDailySleep(entries, totalDays, startDate) {
  var b = new Array(totalDays).fill(0);
  var sl = entries.filter(function(e) { return e.entry_type === 'sleep'; }).sort(function(a,c) { return new Date(a.occurred_at) - new Date(c.occurred_at); });
  for (var i = 0; i < sl.length; i++) {
    if (sl[i].sleep_event !== 'fell_asleep') continue;
    var w = null;
    for (var j = i + 1; j < sl.length; j++) {
      if (sl[j].sleep_event === 'woke_up') { w = sl[j]; break; }
    }
    if (!w) continue;
    var hrs = (new Date(w.occurred_at) - new Date(sl[i].occurred_at)) / 3600000;
    if (hrs <= 0 || hrs > 24) continue;
    var idx = daysBetween(startDate, w.occurred_at);
    if (idx >= 0 && idx < totalDays) b[idx] += Math.round(hrs * 10) / 10;
  }
  return b;
}

function computeDailyDiapers(entries, totalDays, startDate) {
  var wet = new Array(totalDays).fill(0), dirty = new Array(totalDays).fill(0);
  entries.forEach(function(e) {
    if (e.entry_type !== 'diaper') return;
    var i = daysBetween(startDate, e.occurred_at);
    if (i < 0 || i >= totalDays) return;
    if (e.diaper_type === 'wet' || e.diaper_type === 'both') wet[i]++;
    if (e.diaper_type === 'dirty' || e.diaper_type === 'both') dirty[i]++;
  });
  return { wet: wet, dirty: dirty };
}

function computeBreastBottleSplit(entries) {
  var feeds = entries.filter(function(e) { return e.entry_type === 'feeding'; });
  var breast = feeds.filter(function(f) { return f.feed_type === 'breast_left' || f.feed_type === 'breast_right' || f.feed_type === 'breast_both'; }).length;
  var bottle = feeds.filter(function(f) { return f.feed_type === 'bottle'; }).length;
  var total = breast + bottle;
  if (total === 0) return { breastPct: 0, bottlePct: 0 };
  var bp = Math.round((breast / total) * 100);
  return { breastPct: bp, bottlePct: 100 - bp };
}

function computeAvgNaps(entries, totalDays) {
  var napCount = entries.filter(function(e) { return e.entry_type === 'sleep' && e.sleep_event === 'fell_asleep'; }).length;
  return Math.round((napCount / Math.max(1, totalDays)) * 10) / 10;
}

function getHealthEvents(entries) {
  return entries.filter(function(e) { return e.entry_type === 'health' || e.entry_type === 'note'; }).map(function(e) {
    var d = new Date(e.occurred_at);
    return {
      date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: 'numeric', minute: '2-digit' }),
      type: e.entry_type,
      notes: e.notes || null
    };
  });
}

function computeWarnings(ageMonths, feeding, sleep, diaper, entries) {
  var w = [];
  if (ageMonths < 6 && diaper.avgWetPerDay > 0 && diaper.avgWetPerDay < 6) w.push('Average wet diapers is ' + diaper.avgWetPerDay + '/day. The AAP recommends at least 6 per day for babies under 6 months.');
  if (ageMonths < 6 && feeding.avgFeedingsPerDay > 0 && feeding.avgFeedingsPerDay < 6) w.push('Average feeds is ' + feeding.avgFeedingsPerDay + '/day. Babies under 6 months typically need 6-8 feeds per day.');
  if (ageMonths >= 4 && sleep.avgHoursPerDay > 0) {
    if (ageMonths < 12 && sleep.avgHoursPerDay < 12) w.push('Average sleep is ' + sleep.avgHoursPerDay + 'h/day. The AASM recommends 12-16 hours for babies 4-12 months.');
    else if (ageMonths >= 12 && ageMonths < 24 && sleep.avgHoursPerDay < 11) w.push('Average sleep is ' + sleep.avgHoursPerDay + 'h/day. The AASM recommends 11-14 hours for toddlers 1-2 years.');
  }
  /* Check for pale/white/clay stools which can indicate biliary issues */
  if (entries) {
    var paleStool = entries.find(function(e) {
      return e.entry_type === 'diaper' && e.notes && /pale|white|clay|chalky/i.test(e.notes);
    });
    if (paleStool) {
      var d = new Date(paleStool.occurred_at);
      var dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      w.push('Pale/white stool noted on ' + dateStr + '. Pale or clay-colored stools can indicate a bile duct issue. The AAP recommends prompt evaluation.');
    }
  }
  return w;
}

function buildBarSVG(data, color, secondaryData, secondaryColor, legendLabels, chartType, startDate) {
  var W = 480, H = 110;
  var pad = { top: 16, right: 8, bottom: 24, left: 32 };
  var hasStacked = !!secondaryData;
  /* For stacked bars, max is sum of both values */
  var maxVal = 1;
  for (var mi = 0; mi < data.length; mi++) {
    var total = data[mi] + (hasStacked && secondaryData[mi] ? secondaryData[mi] : 0);
    if (total > maxVal) maxVal = total;
  }
  var plotW = W - pad.left - pad.right;
  var plotH = H - pad.top - pad.bottom;
  var slotW = plotW / data.length;
  var barW = Math.max(3, slotW - 3);

  var svg = '';
  [0.25, 0.5, 0.75, 1].forEach(function(frac) {
    var y = pad.top + plotH - plotH * frac;
    var val = Math.round(maxVal * frac * 10) / 10;
    svg += '<line x1="' + pad.left + '" y1="' + y + '" x2="' + (W - pad.right) + '" y2="' + y + '" stroke="rgba(255,255,255,0.10)" stroke-width="0.5" stroke-dasharray="3,3"/>';
    svg += '<text x="' + (pad.left - 6) + '" y="' + (y + 3) + '" fill="rgba(255,255,255,0.55)" font-size="8" font-family="sans-serif" text-anchor="end">' + (val % 1 === 0 ? val : val.toFixed(1)) + '</text>';
  });

  svg += '<line x1="' + pad.left + '" y1="' + (pad.top + plotH) + '" x2="' + (W - pad.right) + '" y2="' + (pad.top + plotH) + '" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>';

  data.forEach(function(val, i) {
    var x = pad.left + i * slotW + (slotW - barW) / 2;
    var rx = Math.min(4, barW / 2);

    svg += '<g class="bar-group" data-day-index="' + i + '" style="cursor:pointer;">';
    svg += '<rect x="' + (pad.left + i * slotW) + '" y="' + pad.top + '" width="' + slotW + '" height="' + plotH + '" fill="transparent" />';

    if (hasStacked) {
      /* Stacked: primary on bottom, secondary on top */
      var h1 = (val / maxVal) * plotH;
      var h2 = secondaryData[i] ? (secondaryData[i] / maxVal) * plotH : 0;
      var baseY = pad.top + plotH;
      var topRx = h2 > 0 ? 0 : rx; /* flat top if secondary stacks above */
      if (h1 > 0) svg += '<rect x="' + x + '" y="' + (baseY - h1) + '" width="' + barW + '" height="' + h1 + '" fill="' + color + '" rx="' + topRx + '" ry="' + topRx + '" opacity="1"/>';
      if (h2 > 0) svg += '<rect x="' + x + '" y="' + (baseY - h1 - h2) + '" width="' + barW + '" height="' + h2 + '" fill="' + secondaryColor + '" rx="' + rx + '" ry="' + rx + '" opacity="1"/>';
    } else {
      var h = (val / maxVal) * plotH;
      var y = pad.top + plotH - h;
      if (h > 0) svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + Math.max(0, h) + '" fill="' + color + '" rx="' + rx + '" ry="' + rx + '" opacity="1"/>';
    }

    svg += '</g>';
  });

  var labelCount = Math.min(data.length, 7);
  var step = Math.max(1, Math.floor(data.length / labelCount));
  data.forEach(function(_, i) {
    var isLast = i === data.length - 1;
    var isStep = i % step === 0;
    /* Skip last label if too close to previous step label */
    if (isLast && !isStep && (data.length - 1) % step < step / 2) return;
    if (!isStep && !isLast) return;
    var x = pad.left + i * slotW + slotW / 2;
    var labelText = 'D' + (i + 1);
    if (startDate) {
      var labelDate = new Date(startDate);
      labelDate.setDate(labelDate.getDate() + i);
      labelText = formatShortDate(labelDate);
    }
    svg += '<text x="' + x + '" y="' + (H - 2) + '" fill="rgba(255,255,255,0.25)" font-size="8" font-family="sans-serif" text-anchor="middle">' + labelText + '</text>';
  });

  var legend = '';
  if (hasStacked && legendLabels) {
    legend = '<rect x="' + pad.left + '" y="' + (H + 6) + '" width="10" height="10" fill="' + color + '" rx="3"/>' +
      '<text x="' + (pad.left + 14) + '" y="' + (H + 14) + '" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">' + legendLabels[0] + '</text>' +
      '<rect x="' + (pad.left + 60) + '" y="' + (H + 6) + '" width="10" height="10" fill="' + secondaryColor + '" rx="3"/>' +
      '<text x="' + (pad.left + 74) + '" y="' + (H + 14) + '" fill="rgba(255,255,255,0.5)" font-size="9" font-family="sans-serif">' + legendLabels[1] + '</text>';
  }

  var svgH = hasStacked ? H + 24 : H;
  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg" style="max-width:' + W + 'px;" data-chart-type="' + (chartType || '') + '">' + svg + legend + '</svg>';
}

function showDayDetail(chartType, dayIdx) {
  /* Hide all detail panels first */
  var panels = document.querySelectorAll('.day-detail');
  for (var p = 0; p < panels.length; p++) {
    panels[p].classList.remove('visible');
  }

  var panel = document.getElementById('detail-' + chartType);
  if (!panel || !_globalEntries || !_globalStartDate) return;

  var dayStart = new Date(_globalStartDate);
  dayStart.setDate(dayStart.getDate() + dayIdx);
  dayStart.setHours(0,0,0,0);
  var dayEnd = new Date(dayStart);
  dayEnd.setDate(dayEnd.getDate() + 1);

  var dayLabel = dayStart.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

  var dayEntries = _globalEntries.filter(function(e) {
    var t = new Date(e.occurred_at);
    return t >= dayStart && t < dayEnd;
  });

  var html = '<div class="day-detail-title">' + esc(dayLabel) + '</div>';
  var rows = [];

  if (chartType === 'feeding') {
    var feeds = dayEntries.filter(function(e) { return e.entry_type === 'feeding'; });
    if (feeds.length === 0) {
      html += '<div style="color:rgba(255,255,255,0.4);font-style:italic;">No feeds recorded</div>';
    } else {
      feeds.forEach(function(f) {
        var t = new Date(f.occurred_at);
        var timeStr = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        var typeLabel = f.feed_type === 'bottle' ? 'Bottle' : 'Breast';
        var detail = '';
        if (f.feed_amount_ml) detail = f.feed_amount_ml + ' mL';
        else if (f.feed_duration_min) detail = f.feed_duration_min + ' min';
        rows.push('<div class="day-detail-row"><span>' + timeStr + ' - ' + typeLabel + '</span><span>' + detail + '</span></div>');
      });
      html += rows.join('');
    }
  } else if (chartType === 'diaper') {
    var diapers = dayEntries.filter(function(e) { return e.entry_type === 'diaper'; });
    if (diapers.length === 0) {
      html += '<div style="color:rgba(255,255,255,0.4);font-style:italic;">No diaper changes recorded</div>';
    } else {
      diapers.forEach(function(d) {
        var t = new Date(d.occurred_at);
        var timeStr = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        var typeLabel = d.diaper_type === 'both' ? 'Wet + Dirty' : d.diaper_type === 'wet' ? 'Wet' : 'Dirty';
        var notes = d.notes ? ' - ' + esc(d.notes) : '';
        rows.push('<div class="day-detail-row"><span>' + timeStr + ' - ' + typeLabel + notes + '</span><span></span></div>');
      });
      html += rows.join('');
    }
  } else if (chartType === 'sleep') {
    var sleepEntries = dayEntries.filter(function(e) { return e.entry_type === 'sleep'; }).sort(function(a,b) { return new Date(a.occurred_at) - new Date(b.occurred_at); });
    /* Also include fell_asleep from previous day that woke up today */
    var allSleep = _globalEntries.filter(function(e) { return e.entry_type === 'sleep'; }).sort(function(a,b) { return new Date(a.occurred_at) - new Date(b.occurred_at); });
    var sessions = [];
    for (var i = 0; i < allSleep.length; i++) {
      if (allSleep[i].sleep_event !== 'fell_asleep') continue;
      var woke = null;
      for (var j = i + 1; j < allSleep.length; j++) {
        if (allSleep[j].sleep_event === 'woke_up') { woke = allSleep[j]; break; }
      }
      if (!woke) continue;
      var wokeTime = new Date(woke.occurred_at);
      var fellTime = new Date(allSleep[i].occurred_at);
      /* Show sessions where woke_up falls on this day */
      if (wokeTime >= dayStart && wokeTime < dayEnd) {
        var dur = (wokeTime - fellTime) / 3600000;
        if (dur > 0 && dur <= 24) {
          sessions.push({ fell: fellTime, woke: wokeTime, hours: Math.round(dur * 10) / 10 });
        }
      }
    }
    if (sessions.length === 0) {
      html += '<div style="color:rgba(255,255,255,0.4);font-style:italic;">No sleep sessions recorded</div>';
    } else {
      sessions.forEach(function(s) {
        var fellStr = s.fell.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        var wokeStr = s.woke.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        rows.push('<div class="day-detail-row"><span>Fell asleep ' + fellStr + ', woke ' + wokeStr + '</span><span>' + s.hours + 'h</span></div>');
      });
      html += rows.join('');
    }
  }

  panel.innerHTML = html;
  panel.classList.add('visible');
}

function attachChartListeners() {
  var groups = document.querySelectorAll('.bar-group');
  for (var i = 0; i < groups.length; i++) {
    (function(g) {
      g.addEventListener('click', function() {
        var dayIdx = parseInt(this.getAttribute('data-day-index'));
        var svg = this.closest('svg');
        var chartType = svg ? svg.getAttribute('data-chart-type') : '';
        /* Clear selected state from siblings */
        var siblings = svg.querySelectorAll('.bar-group');
        for (var s = 0; s < siblings.length; s++) siblings[s].classList.remove('selected');
        this.classList.add('selected');
        if (chartType) showDayDetail(chartType, dayIdx);
      });
    })(groups[i]);
  }
}

function buildNotableEntries(entries, startDate, chartType) {
  if (!entries || !entries.length) return '';
  var notable = [];

  if (chartType === 'diaper') {
    entries.forEach(function(e) {
      if (e.entry_type === 'diaper' && e.notes && /pale|white|clay|chalky|blood|mucus|black|red|green.*mucus/i.test(e.notes)) {
        var d = new Date(e.occurred_at);
        notable.push({ date: d, text: e.notes, type: 'diaper' });
      }
    });
  } else if (chartType === 'feeding') {
    entries.forEach(function(e) {
      if (e.entry_type === 'feeding' && e.notes && /refus|spit|vomit|fuss|latch|pain|concern/i.test(e.notes)) {
        var d = new Date(e.occurred_at);
        notable.push({ date: d, text: e.notes, type: 'feeding' });
      }
    });
  } else if (chartType === 'sleep') {
    entries.forEach(function(e) {
      if (e.entry_type === 'sleep' && e.notes && /wake|cry|scream|restless|apnea|snor|concern/i.test(e.notes)) {
        var d = new Date(e.occurred_at);
        notable.push({ date: d, text: e.notes, type: 'sleep' });
      }
    });
  }

  if (notable.length === 0) return '';

  notable.sort(function(a, b) { return a.date - b.date; });

  var html = '<div class="notable-entries"><div class="notable-entries-title">&#x26A0; Notable entries</div>';
  notable.forEach(function(n) {
    var dateStr = n.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    html += '<div class="notable-entry"><span class="notable-entry-date">' + dateStr + '</span><span class="notable-entry-text">' + esc(n.text) + '</span></div>';
  });
  html += '</div>';
  return html;
}

function renderSummary(data) {
  var babyName = data.babyName;
  var dateOfBirth = data.dateOfBirth;
  var startDate = data.startDate;
  var endDate = data.endDate;
  var totalDays = data.totalDays;
  var feeding = data.feeding;
  var sleep = data.sleep;
  var diaper = data.diaper;
  var entries = data.entries;

  /* Store globally for chart interactivity */
  _globalEntries = entries;
  _globalStartDate = startDate;

  var start = formatDate(startDate);
  var end = formatDate(endDate);
  var ageLabel = calculateAge(dateOfBirth);
  var ageMonths = getAgeMonths(dateOfBirth);

  var dailySleep = computeDailySleep(entries, totalDays, startDate);
  var diaperData = computeDailyDiapers(entries, totalDays, startDate);
  var dailyWet = diaperData.wet;
  var dailyDirty = diaperData.dirty;
  var feedsByType = computeDailyFeedsByType(entries, totalDays, startDate);
  var splitData = computeBreastBottleSplit(entries);
  var breastPct = splitData.breastPct;
  var bottlePct = splitData.bottlePct;
  var healthEvents = getHealthEvents(entries);
  var avgNaps = computeAvgNaps(entries, totalDays);
  var warnings = computeWarnings(ageMonths, feeding, sleep, diaper, entries);

  var feedChart = feeding.totalFeedings > 0 ? buildBarSVG(feedsByType.breast, '#7A9DB0', feedsByType.bottle, '#F2C4A4', ['Breast', 'Bottle'], 'feeding', startDate) : '';
  var sleepChart = sleep.avgHoursPerDay > 0 ? buildBarSVG(dailySleep, '#9B8EC4', null, null, null, 'sleep', startDate) : '';
  var diaperChart = diaper.avgTotalPerDay > 0 ? buildBarSVG(dailyWet, '#5DA6E6', dailyDirty, '#D4956B', ['Wet', 'Dirty'], 'diaper', startDate) : '';

  var feedNotable = buildNotableEntries(entries, startDate, 'feeding');
  var diaperNotable = buildNotableEntries(entries, startDate, 'diaper');
  var sleepNotable = buildNotableEntries(entries, startDate, 'sleep');

  var breakdownBar = (breastPct > 0 || bottlePct > 0) ? '<div class="breakdown-container"><div class="breakdown-label-row"><span class="breakdown-label" style="color:#7A9DB0;">Breast ' + breastPct + '%</span><span class="breakdown-label" style="color:#F2C4A4;">Bottle ' + bottlePct + '%</span></div><div class="breakdown-track"><div class="breakdown-fill-breast" style="width:' + breastPct + '%;"></div><div class="breakdown-fill-bottle" style="width:' + bottlePct + '%;"></div></div></div>' : '';

  var warningsSection = warnings.length === 0 ? '' : '<div class="card warning-card"><div class="card-header"><span class="warning-header-icon">&#x26A0;</span><span class="card-title" style="color:#FBBF24;">Concerns</span></div>' + warnings.map(function(w) { return '<div class="warning-row"><span class="warning-bullet">&#x25CF;</span><span class="warning-text">' + esc(w) + '</span></div>'; }).join('') + '<p class="warning-disclaimer">Based on AAP/AASM guidelines. Not medical advice.</p></div>';

  var healthSection = healthEvents.length > 0 ? '<div class="card"><div class="card-header"><span class="card-icon">&#x1FA7A;</span><span class="card-title">Health Events</span><span class="count">' + healthEvents.length + '</span></div><div class="health-timeline">' + healthEvents.map(function(ev) { return '<div class="health-row"><div class="health-date">' + esc(ev.date) + '</div><div class="health-type">' + (ev.type === 'health' ? 'Health' : 'Note') + '</div>' + (ev.notes ? '<div class="health-notes">' + esc(ev.notes) + '</div>' : '') + '</div>'; }).join('') + '</div></div>' : '';

  document.title = esc(babyName) + ' - Visit Summary';

  var dobLabel = dateOfBirth ? 'DOB: ' + formatDate(dateOfBirth) : '';

  /* Range selector for demo mode */
  var rangeSelector = '';
  if (_isDemoMode) {
    rangeSelector = '<div class="range-selector">' +
      '<button class="range-btn' + (_currentDemoDays === 7 ? ' active' : '') + '" data-days="7">7D</button>' +
      '<button class="range-btn' + (_currentDemoDays === 30 ? ' active' : '') + '" data-days="30">30D</button>' +
      '</div>';
  }

  return '<div class="header"><div class="brand"><img src="data:image/png;base64,' + LOGO_BASE64 + '" class="brand-logo" alt="Remi"/></div><h1>' + esc(babyName) + '</h1><p class="age">' + esc(ageLabel) + '</p>' + (dobLabel ? '<p class="dob">' + esc(dobLabel) + '</p>' : '') + '<p class="period">' + start + ' to ' + end + '</p></div>' +
    rangeSelector +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F37C;</span><span class="card-title">Feeding</span></div>' + (feeding.totalFeedings > 0 ? '<div class="stats-row"><div class="stat-pill accent-blue"><div class="stat-value">' + feeding.avgFeedingsPerDay + '</div><div class="stat-label">Avg Feeds / Day</div></div>' + (feeding.avgAmountMl !== null ? '<div class="stat-pill accent-peach"><div class="stat-value">' + feeding.avgAmountMl + ' mL</div><div class="stat-label">Avg per Bottle</div></div>' : '') + (feeding.avgDurationMin !== null ? '<div class="stat-pill accent-blue" style="background:rgba(122,157,176,0.08);"><div class="stat-value">' + feeding.avgDurationMin + ' min</div><div class="stat-label">Avg per Breast</div></div>' : '') + '</div>' + breakdownBar + '<p class="chart-label">Daily feed counts</p>' + feedChart + feedNotable + '<div class="day-detail" id="detail-feeding"></div>' : '<p class="empty">No feeding data recorded</p>') + '</div>' +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F4A7;</span><span class="card-title">Diapers</span></div>' + (diaper.avgTotalPerDay > 0 ? '<div class="stats-row"><div class="stat-pill accent-sky"><div class="stat-value">' + diaper.avgWetPerDay + '</div><div class="stat-label">Avg Wet / Day</div></div><div class="stat-pill accent-peach"><div class="stat-value">' + diaper.avgDirtyPerDay + '</div><div class="stat-label">Avg Dirty / Day</div></div></div><p class="chart-label">Daily diaper counts</p>' + diaperChart + diaperNotable + '<div class="day-detail" id="detail-diaper"></div>' : '<p class="empty">No diaper data recorded</p>') + '</div>' +
    '<div class="card"><div class="card-header"><span class="card-icon">&#x1F634;</span><span class="card-title">Sleep</span></div>' + (sleep.avgHoursPerDay > 0 ? '<div class="stats-row"><div class="stat-pill accent-purple"><div class="stat-value">' + sleep.avgHoursPerDay + 'h</div><div class="stat-label">Avg Total / Day</div></div><div class="stat-pill accent-blue"><div class="stat-value">' + avgNaps + '</div><div class="stat-label">Avg Naps / Day</div></div></div><p class="chart-label">Daily sleep hours</p>' + sleepChart + sleepNotable + '<div class="day-detail" id="detail-sleep"></div>' : '<p class="empty">No sleep data recorded</p>') + '</div>' +
    warningsSection +
    healthSection +
    '<div class="footer"><div class="footer-brand">Shared via <a href="' + LANDING_URL + '" target="_blank" rel="noopener" class="footer-link">Remi</a> &middot; ' + formatDate(new Date()) + '</div></div>';
}

function showError(message) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerHTML = '<div class="error-wrap"><div class="error-brand"><img src="data:image/png;base64,' + LOGO_BASE64 + '" alt="Remi"/></div><div class="error-card"><div class="error-icon">&#x26A0;</div><h2>Something went wrong</h2><p>' + esc(message) + '</p></div><div class="error-footer">Remi Baby Tracker</div></div>';
}

function generateDemoData(numDays) {
  var totalDays = numDays || 30;
  var today = new Date();
  var seed = today.getFullYear() * 1000 + Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
  var rng = seededRandom(seed);

  var now = new Date();
  var dob = new Date(now);
  dob.setMonth(dob.getMonth() - 5);
  dob.setDate(15);
  var endDate = new Date(now);
  endDate.setHours(23,59,59,0);
  var startDate = new Date(now);
  startDate.setDate(startDate.getDate() - (totalDays - 1));
  startDate.setHours(0,0,0,0);

  var entries = [];
  var feedTypes = ['breast', 'bottle', 'breast', 'breast', 'bottle', 'breast', 'breast'];

  /* Varied diaper notes for realism */
  var stoolNotes = [
    'Yellow, seedy',
    'Green, slightly loose',
    'Yellow, normal consistency',
    'Brownish-yellow, soft',
    'Dark yellow, thick',
    'Greenish, mucusy',
    'Yellow, watery',
    null, null, null, null, null
  ];

  /* Health events spread across the month */
  var healthDays = {};
  if (totalDays >= 7) {
    var healthEventList = [
      { dayOffset: 2, type: 'health', notes: 'Slight temperature of 99.5F, monitoring closely' },
      { dayOffset: Math.floor(totalDays * 0.15), type: 'note', notes: 'Started reaching for toys during tummy time' },
      { dayOffset: Math.floor(totalDays * 0.25), type: 'health', notes: 'Mild congestion, using saline drops' },
      { dayOffset: Math.floor(totalDays * 0.35), type: 'note', notes: 'First time rolling from tummy to back' },
      { dayOffset: Math.floor(totalDays * 0.5), type: 'health', notes: 'Fussy during feeding, possible teething discomfort' },
      { dayOffset: Math.floor(totalDays * 0.6), type: 'note', notes: 'Laughed out loud for the first time' },
      { dayOffset: Math.floor(totalDays * 0.75), type: 'health', notes: 'Small rash on cheeks, likely drool rash' },
      { dayOffset: Math.floor(totalDays * 0.85), type: 'note', notes: 'Grabbing feet during diaper changes' },
      { dayOffset: Math.floor(totalDays * 0.95), type: 'note', notes: 'Responding to name, turning head consistently' }
    ];
    for (var he = 0; he < healthEventList.length; he++) {
      var evt = healthEventList[he];
      if (evt.dayOffset < totalDays) {
        healthDays[evt.dayOffset] = evt;
      }
    }
  }

  for (var d = 0; d < totalDays; d++) {
    var day = new Date(startDate);
    day.setDate(day.getDate() + d);

    /* Varied feed counts: 6-10 range */
    var feedCount = 6 + Math.floor(rng() * 5);
    for (var f = 0; f < feedCount; f++) {
      var h = 6 + Math.floor(f * (16 / feedCount)) + Math.floor(rng() * 2);
      var ft = feedTypes[(d + f) % feedTypes.length];
      var entry = {
        entry_type: 'feeding',
        occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, Math.floor(rng() * 50)).toISOString(),
        feed_type: ft === 'breast' ? 'breast_both' : 'bottle'
      };
      if (ft === 'bottle') {
        entry.feed_amount_ml = 80 + Math.floor(rng() * 70);
      } else {
        entry.feed_duration_min = 10 + Math.floor(rng() * 18);
      }
      entries.push(entry);
    }

    /* Varied nap patterns: some days 2 naps, some days 3 */
    var napVariant = rng();
    var napTimes;
    if (napVariant < 0.3) {
      /* 3 naps */
      napTimes = [[9, 9 + 0.75 + rng() * 0.5], [12, 12 + 1 + rng() * 0.5], [15, 15 + 0.5 + rng() * 0.5]];
    } else if (napVariant < 0.8) {
      /* 2 naps */
      napTimes = [[9, 10 + rng() * 0.5], [13, 14.5 + rng()]];
    } else {
      /* 1 longer nap */
      napTimes = [[11, 13.5 + rng()]];
    }
    for (var n = 0; n < napTimes.length; n++) {
      var fellH = Math.floor(napTimes[n][0]);
      var fellM = Math.floor((napTimes[n][0] - fellH) * 60);
      var wokeH = Math.floor(napTimes[n][1]);
      var wokeM = Math.floor((napTimes[n][1] - wokeH) * 60);
      entries.push({ entry_type: 'sleep', occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), fellH, fellM).toISOString(), sleep_event: 'fell_asleep' });
      entries.push({ entry_type: 'sleep', occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), wokeH, wokeM).toISOString(), sleep_event: 'woke_up' });
    }

    /* Night sleep with slight variation (shorter to trigger sleep concern) */
    var nightFell = 20 + Math.floor(rng() * 2);
    var nightFellMin = Math.floor(rng() * 30);
    entries.push({ entry_type: 'sleep', occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), nightFell, nightFellMin).toISOString(), sleep_event: 'fell_asleep' });
    var nextDay = new Date(day); nextDay.setDate(nextDay.getDate() + 1);
    var wakeH = 5 + Math.floor(rng() * 2);
    var wakeM = Math.floor(rng() * 45);
    entries.push({ entry_type: 'sleep', occurred_at: new Date(nextDay.getFullYear(), nextDay.getMonth(), nextDay.getDate(), wakeH, wakeM).toISOString(), sleep_event: 'woke_up' });

    /* Diapers with varied count (4-7) to show realistic range including low days */
    var diaperCount = 4 + Math.floor(rng() * 4);
    var baseDiaperTypes = ['wet','wet','dirty','wet','both','wet','wet','dirty','wet'];
    for (var dp = 0; dp < diaperCount; dp++) {
      var dType = baseDiaperTypes[dp % baseDiaperTypes.length];
      /* Randomize type slightly */
      var typeRoll = rng();
      if (typeRoll < 0.1) dType = 'both';
      else if (typeRoll < 0.3) dType = 'dirty';
      else dType = 'wet';

      var diaperEntry = {
        entry_type: 'diaper',
        occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), 6 + Math.floor(dp * (14 / diaperCount)), 5 + Math.floor(rng() * 45)).toISOString(),
        diaper_type: dType
      };

      /* Add stool notes for some dirty/both diapers */
      if ((dType === 'dirty' || dType === 'both') && rng() < 0.5) {
        var noteIdx = Math.floor(rng() * stoolNotes.length);
        if (stoolNotes[noteIdx]) diaperEntry.notes = stoolNotes[noteIdx];
      }

      entries.push(diaperEntry);
    }

    /* Health events */
    if (healthDays[d]) {
      entries.push({
        entry_type: healthDays[d].type,
        occurred_at: new Date(day.getFullYear(), day.getMonth(), day.getDate(), 8 + Math.floor(rng() * 8), Math.floor(rng() * 50)).toISOString(),
        notes: healthDays[d].notes
      });
    }
  }

  /* Add a pale stool entry for 30d demo to trigger stool concern */
  if (totalDays >= 14) {
    var paleDay = new Date(startDate);
    paleDay.setDate(paleDay.getDate() + Math.floor(totalDays * 0.7));
    entries.push({
      entry_type: 'diaper',
      occurred_at: new Date(paleDay.getFullYear(), paleDay.getMonth(), paleDay.getDate(), 11, 20).toISOString(),
      diaper_type: 'dirty',
      notes: 'Pale, almost white, clay-like consistency'
    });
  }

  entries.sort(function(a, b) { return new Date(a.occurred_at) - new Date(b.occurred_at); });

  var totalFeedings = entries.filter(function(e) { return e.entry_type === 'feeding'; }).length;
  var bottleEntries = entries.filter(function(e) { return e.entry_type === 'feeding' && e.feed_amount_ml; });
  var breastEntries = entries.filter(function(e) { return e.entry_type === 'feeding' && e.feed_duration_min; });
  var avgMl = bottleEntries.length > 0 ? Math.round(bottleEntries.reduce(function(s, e) { return s + e.feed_amount_ml; }, 0) / bottleEntries.length) : null;
  var avgDur = breastEntries.length > 0 ? Math.round(breastEntries.reduce(function(s, e) { return s + e.feed_duration_min; }, 0) / breastEntries.length) : null;

  /* Compute actual diaper averages from entries */
  var wetTotal = 0, dirtyTotal = 0;
  entries.forEach(function(e) {
    if (e.entry_type !== 'diaper') return;
    if (e.diaper_type === 'wet' || e.diaper_type === 'both') wetTotal++;
    if (e.diaper_type === 'dirty' || e.diaper_type === 'both') dirtyTotal++;
  });
  var avgWet = Math.round((wetTotal / totalDays) * 10) / 10;
  var avgDirty = Math.round((dirtyTotal / totalDays) * 10) / 10;

  /* Compute actual avg sleep from entries */
  var sleepData = computeDailySleep(entries, totalDays, startDate.toISOString());
  var totalSleepHrs = sleepData.reduce(function(s, v) { return s + v; }, 0);
  var avgSleep = Math.round((totalSleepHrs / totalDays) * 10) / 10;

  return {
    babyName: 'Emma',
    dateOfBirth: dob.toISOString().split('T')[0],
    startDate: startDate.toISOString(),
    endDate: endDate.toISOString(),
    totalDays: totalDays,
    feeding: {
      totalFeedings: totalFeedings,
      avgFeedingsPerDay: Math.round(totalFeedings / totalDays * 10) / 10,
      avgAmountMl: avgMl,
      avgDurationMin: avgDur
    },
    sleep: { avgHoursPerDay: avgSleep },
    diaper: { avgWetPerDay: avgWet, avgDirtyPerDay: avgDirty, avgTotalPerDay: Math.round((avgWet + avgDirty) * 10) / 10 },
    entries: entries
  };
}

function renderDemo(numDays) {
  _currentDemoDays = numDays || 30;
  var data = generateDemoData(_currentDemoDays);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('content').innerHTML = renderSummary(data);
  attachChartListeners();

  /* Attach range button click handlers */
  var buttons = document.querySelectorAll('.range-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      var days = parseInt(this.getAttribute('data-days'));
      renderDemo(days);
    });
  }
}

async function init() {
  var params = new URLSearchParams(window.location.search);
  var shareId = params.get('id');

  if (!shareId) {
    showError('No share ID provided. Please check your link.');
    return;
  }

  if (shareId === 'demo') {
    _isDemoMode = true;
    renderDemo(30);
    return;
  }

  try {
    var res = await fetch(API_BASE + '?id=' + encodeURIComponent(shareId));
    var data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Failed to load visit summary.');
      return;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = renderSummary(data);
    attachChartListeners();
  } catch (err) {
    showError('Unable to load visit summary. Please try again later.');
  }
}

init();
</script>
